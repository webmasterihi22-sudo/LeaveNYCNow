<title>Advertise on LeaveNYCNow.com</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Oswald:wght@400;600&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5f0e8;color:#1a1a1a;font-family:'Libre Baskerville',Georgia,serif}
header{background:#0a0a0a;padding:20px 40px;text-align:center}
header a{display:inline-block;font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:#f5f0e8;text-decoration:none}
header a span{color:#c41e1e}
nav{background:#111;display:flex;justify-content:center;flex-wrap:wrap}
nav a{color:#888;text-decoration:none;padding:10px 18px;font-family:'Oswald',sans-serif;font-size:11px;letter-spacing:2px;text-transform:uppercase}
nav a:hover{color:#fff}
.hero{background:#0a0a0a;color:#f5f0e8;padding:56px 40px;text-align:center}
.hero h1{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3.5rem);font-weight:900;margin-bottom:14px}
.hero h1 em{color:#c41e1e;font-style:italic}
.hero p{color:#aaa;max-width:600px;margin:0 auto;line-height:1.8;font-size:1rem}
.wrap{max-width:960px;margin:0 auto;padding:56px 40px}
.rates{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;background:#d4cfc4;margin-bottom:48px}
.rate-card{background:#ede8dc;padding:28px 24px;text-align:center}
.rate-card .badge{display:inline-block;background:#c41e1e;color:#fff;font-family:'Oswald',sans-serif;font-size:9px;font-weight:700;letter-spacing:3px;text-transform:uppercase;padding:3px 10px;margin-bottom:12px}
.rate-card h3{font-family:'Playfair Display',serif;font-size:1.2rem;margin-bottom:8px}
.rate-card .price{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;color:#c41e1e;margin-bottom:6px}
.rate-card .price span{font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#6b6b6b;display:block}
.rate-card p{font-size:.82rem;color:#6b6b6b;line-height:1.6}
.form-section h2{font-family:'Playfair Display',serif;font-size:1.8rem;font-weight:700;margin-bottom:6px}
.form-section .sub{font-size:.9rem;color:#6b6b6b;margin-bottom:28px;font-style:italic}
form{background:#fff;border:1px solid #d4cfc4;padding:36px}
.field{margin-bottom:20px}
label{display:block;font-family:'Oswald',sans-serif;font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#555;margin-bottom:6px}
input[type=text],input[type=email],input[type=tel],select,textarea{width:100%;padding:12px 14px;border:2px solid #d4cfc4;background:#f5f0e8;font-family:'Libre Baskerville',serif;font-size:.9rem;color:#1a1a1a;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#c41e1e}
textarea{min-height:120px;resize:vertical}
